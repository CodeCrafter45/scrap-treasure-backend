<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Elite - Scrap Treasure</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #059669;
            --primary-light: #ecfdf5;
            --secondary: #06b6d4;
            --dark: #0f172a;
            --gray: #64748b;
            --danger: #ef4444;
            --sidebar-width: 280px;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: var(--dark);
            display: flex;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.05) 0px, transparent 50%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e2e8f0;
            height: 100vh;
            position: fixed;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 50px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--primary-light);
            color: var(--primary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        /* --- MAIN CONTAINER --- */
        .main-container {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
        }

        .top-bar {
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .logout-btn {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover { background: #fecaca; transform: scale(1.02); }

        /* --- CONTENT & BENTO GRID --- */
        .content { padding: 40px 50px; max-width: 1400px; margin: 0 auto; }

        .header-section { margin-bottom: 35px; }
        .header-section h2 { font-size: 32px; font-weight: 700; color: var(--dark); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: var(--card-shadow);
        }

        .stat-card i { font-size: 20px; color: var(--primary); background: var(--primary-light); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .stat-card h4 { color: var(--gray); font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { font-size: 28px; font-weight: 700; margin-top: 5px; }

        /* Add Category Card */
        .admin-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: var(--card-shadow);
            margin-bottom: 40px;
        }

        .form-inline {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            margin-top: 20px;
        }

        /* --- FORCE STYLE INPUTS & DYNAMIC LISTS --- */
        input {
            padding: 14px 20px !important;
            border: 1.5px solid #e2e8f0 !important;
            border-radius: 12px !important;
            font-family: inherit !important;
            background: #f8fafc !important;
            outline: none !important;
            transition: 0.3s !important;
        }

        input:focus { border-color: var(--primary) !important; background: white !important; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1) !important; }

        .btn-add {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            padding: 14px 30px !important;
            border-radius: 12px !important;
            font-weight: 700 !important;
            cursor: pointer !important;
            transition: 0.3s !important;
        }

        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3); }

        /* Dynamic Cards Grid */
        #collectorList, #categoryList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        /* Dynamic Items */
        #collectorList > div, #categoryList > div {
            background: white !important;
            padding: 24px !important;
            border-radius: 20px !important;
            border: 1px solid #e2e8f0 !important;
            box-shadow: var(--card-shadow) !important;
            transition: 0.3s ease !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 8px !important;
        }

        #collectorList > div:hover, #categoryList > div:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        #collectorList b, #categoryList b { color: var(--primary); font-weight: 600; }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 40px 10px; }
            .logo-box span, .nav-link span { display: none; }
            .main-container { margin-left: 80px; width: calc(100% - 80px); }
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box">
            <i class="fas fa-shield-halved"></i>
            <span>Scrap Treasure</span>
        </div>
        <nav>
            <a href="#" class="nav-link">
                <i class="fas fa-grid-2"></i>
                <span>Management Hub</span>
            </a>
        </nav>
    </aside>

    <main class="main-container">
        
        <header class="top-bar">
            <div style="font-size: 14px; color: var(--gray);">
                Role: <span style="color: var(--dark); font-weight: 600;">System Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-power-off"></i> Logout
            </button>
        </header>

        <section class="content">
            <div class="header-section">
                <h2>Admin Overview</h2>
                <p style="color: var(--gray);">Monitor collectors and manage scrap pricing.</p>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <i class="fas fa-users-gear"></i>
                    <h4>Total Collectors</h4>
                    <p id="totalCollectors">--</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-layer-group"></i>
                    <h4>Active Categories</h4>
                    <p id="totalCategories">--</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <h4>System Health</h4>
                    <p>Optimal</p>
                </div>
            </div>

            <div class="admin-card">
                <h3 style="font-size: 18px; font-weight: 700;"><i class="fas fa-plus-circle" style="color: var(--primary); margin-right: 8px;"></i> Configure Pricing</h3>
                <div class="form-inline">
                    <input id="catName" placeholder="Category (e.g. Copper)">
                    <input id="catPrice" placeholder="Price (₹ per kg)">
                    <button class="btn-add" onclick="addCategory()">
                        Save Category
                    </button>
                </div>
            </div>

            <div class="data-grids">
                <h3 style="margin-top: 40px;"><i class="fas fa-id-badge" style="color: var(--primary); margin-right: 10px;"></i> Field Collectors</h3>
                <div id="collectorList">
                    </div>

                <h3 style="margin-top: 50px;"><i class="fas fa-coins" style="color: var(--primary); margin-right: 10px;"></i> Price Catalog</h3>
                <div id="categoryList">
                    </div>
            </div>
        </section>

    </main>

    <script src="js/admin.js"></script>

    <script>
        function logout(){
            localStorage.clear();
            window.location.href = "login.html";
        }

        window.onload = function () {
            if(typeof loadCollectors === "function") loadCollectors();
            if(typeof loadCategories === "function") loadCategories();
            
            // Optional: Simple count logic for the stats if your admin.js allows it
            setTimeout(() => {
                const collectors = document.getElementById("collectorList").children.length;
                const categories = document.getElementById("categoryList").children.length;
                document.getElementById("totalCollectors").innerText = collectors || "0";
                document.getElementById("totalCategories").innerText = categories || "0";
            }, 1000);
        };
    </script>
</body>
</html>
