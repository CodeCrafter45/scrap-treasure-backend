<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Scrap Treasure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00b894;
            --secondary: #00cec9;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Vibrant Eco-Gradient Background */
            background: linear-gradient(135deg, #55efc4 0%, #81ecec 50%, #74b9ff 100%);
            overflow-x: hidden;
        }

        /* Decorative Floating Circles for Visual Interest */
        body::before, body::after {
            content: "";
            position: absolute;
            z-index: -1;
            border-radius: 50%;
        }
        body::before { width: 300px; height: 300px; background: rgba(255,255,255,0.2); top: -50px; left: -50px; }
        body::after { width: 200px; height: 200px; background: rgba(255,255,255,0.15); bottom: 20px; right: 20px; }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0;
            color: var(--dark);
            font-weight: 700;
            font-size: 28px;
        }

        p.subtitle {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 18px;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 18px;
        }

        input, select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid transparent;
            background: #f1f2f6;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 184, 148, 0.1);
        }

        /* The "Shiny" Button */
        .btn-grad {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(to right, #00b894, #00cec9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.5s;
            background-size: 200% auto;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }

        .btn-grad:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #636e72;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">♻️</div>
        <h2>Scrap Treasure</h2>
        <p class="subtitle">Turn your waste into wealth today.</p>

        <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input id="name" type="text" placeholder="Full Name">
        </div>

        <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input id="email" type="email" placeholder="Email Address">
        </div>

        <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input id="password" type="password" placeholder="Password">
        </div>

        <div class="input-wrapper">
            <i class="fas fa-users"></i>
            <select id="role">
                <option value="" disabled selected>Join as...</option>
                <option value="CLIENT">Client (I sell scrap)</option>
                <option value="COLLECTOR">Collector (I pick up)</option>
            </select>
        </div>

        <button class="btn-grad" onclick="register()">
            Create Account
        </button>

        <p class="footer-text">
            Already a member? <a href="login.html">Sign In</a>
        </p>
    </div>

    <script>
        function register() {
            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: document.getElementById("role").value
            };

            if (!data.name || !data.email || !data.password || !data.role) {
                alert("Please fill all fields");
                return;
            }

            fetch("http://localhost:8080/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
            .then(res => res.text())
            .then(text => {
                console.log("Response:", text);
                alert(text);
                window.location.href = "login.html";
            })
            .catch(err => {
                console.error(err);
                alert("Registration failed");
            });
        }
    </script>

</body>
</html>
